<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymMamba 2.0 — Agregar Producto</title>
  <link rel="stylesheet" href="styles.css?v=3" />
<script src="theme.js"></script>
</head>
<body data-page="backoffice">
<div id="nav-placeholder"></div>
<script src="nav.js"></script>

<div class="page">
  <div class="demo-banner">⚠️ Modo demo — sin base de datos. Datos de ejemplo.</div>

  <div class="flex-between mb-20">
    <div style="font-size:28px; font-weight:700;">Nuevo Producto</div>
    <div class="flex-gap">
      <a href="backoffice.html" class="btn btn-ghost" style="padding:8px 14px; font-size:14px; border-radius:4px;">Ir a Inicio</a>
    </div>
  </div>

  <div style="max-width:500px;">
    <div class="card">
      <div class="form-group">
        <label style="color:var(--text-88);">Nombre del Producto</label>
        <input type="text" placeholder="Ej: Agua 600ml" value="Agua 600ml" />
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
        <div class="form-group">
          <label style="color:var(--text-88);">Precio de Venta</label>
          <input type="number" value="15" />
        </div>
        <div class="form-group">
          <label style="color:var(--text-88);">Costo</label>
          <input type="number" value="6" />
        </div>
      </div>

      <!-- Calculated profit — readonly display -->
      <div class="form-group">
        <label style="color:var(--text-88);">Ganancia Estimada</label>
        <div style="background:var(--bg); border:1px solid var(--border2); border-radius:6px; padding:10px; color:var(--green); font-weight:700; font-size:14px;">
          $9.00 &nbsp;·&nbsp; 60% margen
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
        <div class="form-group">
          <label style="color:var(--text-88);">Stock Actual</label>
          <input type="number" value="42" />
        </div>
        <div class="form-group">
          <label style="color:var(--text-88);">Alerta Mínimo</label>
          <input type="number" value="5" />
        </div>
      </div>

      <div class="form-group">
        <label style="color:var(--text-88);">Categoría</label>
        <select>
          <option>Bebidas</option>
          <option>Suplementos</option>
          <option>Ropa y Accesorios</option>
          <option>Equipo</option>
          <option>Snacks</option>
          <option>Otro</option>
        </select>
      </div>

      <div style="display:flex; align-items:center; justify-content:flex-end; gap:16px; margin-top:8px;">
        <a href="backoffice.html" style="color:var(--text-66); font-size:14px; text-decoration:none;">Cancelar</a>
        <a href="backoffice.html" class="btn btn-primary" style="padding:8px 14px; font-size:14px; border-radius:4px; font-weight:700;">
          Guardar Producto
        </a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
