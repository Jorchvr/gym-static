<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymMamba 2.0 — Registrar Gasto</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="historial">
<div id="nav-placeholder"></div>
<script src="nav.js"></script>

<div class="page">
  <div class="demo-banner">⚠️ Modo demo — sin base de datos. Datos de ejemplo.</div>

  <div class="flex-between mb-20">
    <div style="font-size:24px; font-weight:700;">💸 Registrar Gasto / Egreso</div>
    <a href="historial.html" class="btn btn-primary" style="padding:10px 20px; font-size:14px; border-radius:5px;">← Volver al Historial</a>
  </div>

  <div style="max-width:520px;">
    <div style="background:var(--card3); border:1px solid var(--border2); border-radius:10px; padding:20px;">
      <div class="form-group">
        <label style="color:var(--text-aa);">Descripción de Gasto</label>
        <input type="text" placeholder="Ej: Limpieza, renta, servicios…" style="background:#121212; border-color:#444;" />
      </div>

      <div class="form-group">
        <label style="color:var(--text-aa);">Categoría</label>
        <select style="background:#121212; border-color:#444;">
          <option>Mantenimiento</option>
          <option>Servicios (luz, agua, internet)</option>
          <option>Nómina / Personal</option>
          <option>Inventario</option>
          <option>Publicidad</option>
          <option>Renta</option>
          <option>Otro</option>
        </select>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
        <div class="form-group">
          <label style="color:var(--text-aa);">Monto</label>
          <input type="number" placeholder="0.00" style="background:#121212; border-color:#444; color:var(--accent); font-weight:600;" />
        </div>
        <div class="form-group">
          <label style="color:var(--text-aa);">Fecha</label>
          <input type="date" value="2026-06-15" style="background:#121212; border-color:#444;" />
        </div>
      </div>

      <div class="form-group">
        <label style="color:var(--text-aa);">Notas (opcional)</label>
        <textarea rows="3" placeholder="Descripción adicional…" style="background:#121212; border-color:#444; resize:vertical;"></textarea>
      </div>

      <div style="display:flex; align-items:center; justify-content:flex-end; gap:16px; margin-top:8px;">
        <a href="historial.html" style="color:var(--text-66); font-size:14px; text-decoration:none;">Cancelar</a>
        <a href="historial.html" class="btn btn-primary" style="height:42px; padding:0 18px; font-size:16px; border-radius:5px;">
          ✅ Registrar Gasto
        </a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
