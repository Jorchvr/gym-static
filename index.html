<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GymMamba 2.0 — Login</title>
<link rel="stylesheet" href="styles.css"/>
<style>
  body {
    background: #050505;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }

  /* close button top-right */
  .close-btn {
    position: fixed; top: 15px; right: 15px; z-index: 100;
    background: transparent; border: none; color: #fff;
    font-size: 20px; font-weight: 700; cursor: pointer;
    font-family: 'Segoe UI', sans-serif;
  }

  /* logo white box: 320x200, CornerRadius 15 */
  .logo-box {
    width: 320px; height: 200px;
    background: #fff; border-radius: 15px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px; font-size: 6rem;
  }

  /* login card: Width 450, #1A1A1A, CornerRadius 15, Padding 40,
     Border #333333, Opacity 0.95, DropShadow */
  .login-card {
    width: 450px;
    background: #1A1A1A; border: 1px solid #333333;
    border-radius: 15px; padding: 40px; opacity: 0.95;
    box-shadow: 0 0 20px rgba(0,0,0,.5);
  }

  /* "Iniciar Sesión": White 28px Bold */
  .login-title { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 10px; }

  /* "Accede al sistema": #AAAAAA, margin 0,0,30 */
  .login-sub { color: #AAAAAA; margin-bottom: 30px; }

  /* Label: #AAAAAA Bold, margin-bottom 8 */
  .login-lbl { color: #AAAAAA; font-weight: 700; margin-bottom: 8px; display: block; }

  /* Input height 45 */
  .login-input { height: 45px; }

  /* Checkbox row */
  .remember-row {
    display: flex; align-items: center; justify-content: space-between;
    margin: 20px 0;
  }
  .remember-row label { display: flex; align-items: center; gap: 6px; color: #AAAAAA; cursor: pointer; }
  .remember-row a { color: #E0E0E0; font-size: 12px; text-decoration: none; cursor: pointer; }

  /* Enter button: Height 55, #E0E0E0, Black, Bold, 17px, CornerRadius 8, margin 10,0,20 */
  .login-btn {
    width: 100%; height: 55px;
    background: #E0E0E0; color: #000;
    font-size: 17px; font-weight: 700;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: 'Segoe UI', sans-serif;
    margin: 10px 0 20px; display: block;
    text-align: center; line-height: 55px;
    text-decoration: none; transition: opacity .12s;
  }
  .login-btn:hover { opacity: .88; }

  /* Footer: #444, 10px, Center */
  .login-footer { color: #444; font-size: 10px; text-align: center; }
</style>
</head>
<body>
  <button class="close-btn">✕</button>

  <div style="display:flex; flex-direction:column; align-items:center;">
    <!-- Logo: white box 320x200 CornerRadius 15 -->
    <div class="logo-box">🐍</div>

    <!-- Login box -->
    <div class="login-card">
      <div class="login-title">Iniciar Sesión</div>
      <div class="login-sub">Accede al sistema</div>

      <div class="login-lbl">Usuario</div>
      <input class="input-login login-input" type="text" value="admin" style="margin-bottom:0;" />

      <div class="login-lbl" style="margin-top:20px;">Contraseña</div>
      <input class="input-login login-input" type="password" value="12345" />

      <div class="remember-row">
        <label>
          <input type="checkbox" checked style="width:auto;" /> Recordarme
        </label>
        <a href="#">¿Problemas de acceso?</a>
      </div>

      <a href="dashboard.html" class="login-btn">ENTRAR AL SISTEMA</a>

      <div class="login-footer">Sistema de Gestión v2.0</div>
    </div>
  </div>
</body>
</html>
