<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymMamba 2.0 — Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="login-page">
  <div class="login-box">

    <!-- Logo: exact white box 320x200 CornerRadius 15 from XAML -->
    <div class="login-logo-box">🐍</div>

    <div class="login-title">Iniciar Sesión</div>
    <div class="login-subtitle">Accede al sistema</div>

    <div class="form-group">
      <div class="login-label">Usuario</div>
      <input class="login-input" type="text" value="admin" placeholder="Usuario" />
    </div>

    <div class="form-group">
      <div class="login-label">Contraseña</div>
      <input class="login-input" type="password" value="12345" placeholder="••••••••" />
    </div>

    <div style="display:flex; align-items:center; justify-content:space-between; margin-top:20px; margin-bottom:0;">
      <label style="display:flex; align-items:center; gap:6px; color:var(--text-aa); font-size:14px; text-transform:none; letter-spacing:0; cursor:pointer;">
        <input type="checkbox" checked style="width:auto;" /> Recordarme
      </label>
      <a href="#" class="login-help">¿Problemas de acceso?</a>
    </div>

    <a href="dashboard.html">
      <button class="login-btn">ENTRAR AL SISTEMA</button>
    </a>

    <!-- Fingerprint access -->
    <div style="border-top:1px solid var(--border2); padding-top:18px;">
      <div class="sec-label" style="text-align:center; margin-bottom:12px;">Acceso Biométrico</div>
      <div class="fp-area" onclick="window.location='dashboard.html'" style="padding:20px;">
        <span class="fp-icon">👆</span>
        <span class="fp-label">Toca para escanear huella digital</span>
      </div>
    </div>

    <div class="login-footer" style="margin-top:20px;">Sistema de Gestión v2.0</div>
  </div>
</div>
</body>
</html>
