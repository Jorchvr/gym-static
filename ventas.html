<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymMamba 2.0 — Ventas Externas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="ventas">
<div id="nav-placeholder"></div>
<script src="nav.js"></script>

<div class="page">
  <div class="demo-banner">⚠️ Modo demo — sin base de datos. Datos de ejemplo.</div>

  <!-- Header — exact "Ventas Externas" FontSize 28 Bold -->
  <div class="flex-between mb-20">
    <div style="font-size:28px; font-weight:700; color:var(--text);">Ventas Externas</div>
    <!-- "Volver": #333 bg, White, Bold, Padding 20,10, CornerRadius 5 -->
    <a href="dashboard.html" class="btn btn-ghost" style="padding:10px 20px; border-radius:5px; font-weight:700;">Volver</a>
  </div>

  <!-- Exact 900x600 layout: input card + cart -->
  <div style="display:grid; grid-template-columns:1fr 340px; gap:15px; align-items:start;">

    <!-- ═══ LEFT — Input + recent sales ═══ -->
    <div>
      <!-- Input card — exact #1E1E1E, CornerRadius 10, Padding 20, Border #333 -->
      <div style="background:var(--card3); border:1px solid var(--border2); border-radius:10px; padding:20px; margin-bottom:15px;">
        <div style="display:grid; grid-template-columns:1fr 1fr auto; gap:15px; align-items:flex-end;">
          <div>
            <!-- "Descripción de servicio" label: #AAAAAA Bold, margin-bottom 5 -->
            <div style="color:var(--text-aa); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px;">Descripción de servicio</div>
            <input type="text" placeholder="Producto o servicio…" style="background:#121212; border-color:#444; font-size:14px;" />
          </div>
          <div>
            <!-- "Monto" label: #AAAAAA Bold -->
            <div style="color:var(--text-aa); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px;">Monto</div>
            <!-- Monto input: #E0E0E0 foreground, #121212 bg, #444 border -->
            <input type="number" placeholder="0.00" style="background:#121212; border-color:#444; font-size:14px; color:var(--accent); font-weight:600;" />
          </div>
          <!-- "Agregar" RedBtn: #E0E0E0, Black, Bold, FontSize 16, Height 42, CornerRadius 5 -->
          <button class="btn btn-primary" style="height:42px; padding:0 18px; font-size:16px; border-radius:5px; white-space:nowrap;">Agregar</button>
        </div>

        <!-- Info message — exact ℹ️ #2196F3, text #AAAAAA FontSize 12 -->
        <div style="display:flex; align-items:center; gap:5px; margin-top:12px;">
          <span style="color:#2196F3; font-size:14px;">ℹ️</span>
          <span style="color:var(--text-aa); font-size:12px;">Esta sección es para ventas de servicios o productos no registrados en el catálogo principal.</span>
        </div>
      </div>

      <!-- Recent list as product buttons (like tienda online) -->
      <div style="background:var(--card3); border:1px solid var(--border2); border-radius:10px; padding:20px;">
        <div class="sec-label mb-14">Productos del Catálogo</div>
        <div style="display:flex; flex-wrap:wrap; gap:0;">
          <button class="product-btn"><span class="emoji">💧</span>Agua<br><small>$15</small></button>
          <button class="product-btn"><span class="emoji">🥤</span>Proteína<br><small>$80</small></button>
          <button class="product-btn"><span class="emoji">🍫</span>Barra<br><small>$35</small></button>
          <button class="product-btn"><span class="emoji">👕</span>Playera<br><small>$220</small></button>
          <button class="product-btn"><span class="emoji">🧢</span>Gorra<br><small>$180</small></button>
          <button class="product-btn"><span class="emoji">🔑</span>Candado<br><small>$60</small></button>
          <button class="product-btn"><span class="emoji">🥛</span>Leche<br><small>$45</small></button>
          <button class="product-btn"><span class="emoji">🏋️</span>Guantes<br><small>$280</small></button>
        </div>
      </div>
    </div>

    <!-- ═══ RIGHT — Cart ═══ -->
    <!-- Cart: #1E1E1E bg, CornerRadius 10, Padding 20, Border #333 -->
    <div style="background:var(--card3); border:1px solid var(--border2); border-radius:10px; padding:20px; position:sticky; top:80px;">

      <!-- "🛒 Carrito" White Bold FontSize 16 -->
      <div style="font-size:16px; font-weight:700; color:var(--text); margin-bottom:10px;">🛒 Carrito</div>

      <!-- Items: ListBox transparent, item #252525 CornerRadius 5 Padding 10 -->
      <div style="min-height:160px; margin-bottom:14px;">
        <!-- Item template: #252525, CornerRadius 5, Padding 10, margin 0,0,5 -->
        <div style="background:var(--row); border-radius:5px; padding:10px; margin-bottom:5px; display:flex; align-items:center; justify-content:space-between;">
          <div>
            <div style="font-weight:700; font-size:14px; color:var(--text);">💧 Agua 600ml</div>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            <span style="color:var(--accent); font-weight:700; font-size:14px; margin-right:15px;">$15</span>
            <button style="color:#666; background:transparent; border:none; cursor:pointer; font-size:16px;">❌</button>
          </div>
        </div>
        <div style="background:var(--row); border-radius:5px; padding:10px; margin-bottom:5px; display:flex; align-items:center; justify-content:space-between;">
          <div>
            <div style="font-weight:700; font-size:14px; color:var(--text);">🥤 Proteína 30g</div>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            <span style="color:var(--accent); font-weight:700; font-size:14px; margin-right:15px;">$80</span>
            <button style="color:#666; background:transparent; border:none; cursor:pointer; font-size:16px;">❌</button>
          </div>
        </div>
      </div>

      <!-- Total — FontSize 32 Bold White -->
      <div>
        <div style="font-size:12px; color:var(--text-aa);">Total a Cobrar</div>
        <div style="font-size:32px; font-weight:700; color:var(--text); margin-bottom:12px;">$95</div>
      </div>

      <!-- Payment radios -->
      <div style="display:flex; gap:14px; margin-bottom:14px;">
        <label style="display:flex; align-items:center; gap:6px; color:var(--text); font-size:14px; cursor:pointer; text-transform:none; letter-spacing:0;">
          <input type="radio" name="extpay" checked style="width:auto;" /> 💵 Efectivo
        </label>
        <label style="display:flex; align-items:center; gap:6px; color:var(--text); font-size:14px; cursor:pointer; text-transform:none; letter-spacing:0;">
          <input type="radio" name="extpay" style="width:auto;" /> 💳 Tarjeta
        </label>
      </div>

      <!-- "✅ COBRAR" RedBtn: #E0E0E0 Black Bold, Height 50, Width 150 (full) -->
      <button class="btn btn-primary btn-full" style="height:50px; font-size:16px; border-radius:5px;">
        ✅ COBRAR $95
      </button>
    </div>
  </div>
</div>
</body>
</html>
